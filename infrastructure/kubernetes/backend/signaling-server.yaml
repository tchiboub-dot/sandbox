apiVersion: apps/v1
kind: Deployment
metadata:
  name: signaling-server
  namespace: cloud-device-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: signaling-server
  template:
    metadata:
      labels:
        app: signaling-server
    spec:
      containers:
      - name: signaling-server
        image: your-registry/cloud-device-lab-signaling:latest
        ports:
        - containerPort: 5001
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "5001"
        - name: API_URL
          value: "http://api-server:5000"
        - name: CORS_ORIGIN
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: frontend-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: signaling-server
  namespace: cloud-device-lab
spec:
  selector:
    app: signaling-server
  ports:
  - port: 5001
    targetPort: 5001
  type: ClusterIP
